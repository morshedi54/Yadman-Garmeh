name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install Cordova
        run: npm install -g cordova
      - name: Create Cordova project
        run: cordova create app com.yadman.garmeh "یادمان گرمه"
      - name: Copy files
        run: |
          cp index.html app/www/index.html
          cp config.xml app/config.xml
      - name: Add Android platform
        run: cd app && cordova platform add android
      - name: Build APK
        run: cd app && cordova build android --release
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: yadman-app
          path: app/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
